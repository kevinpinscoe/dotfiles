---
# The editor to use with 'cheat -e <sheet>'. Overridden by $VISUAL or $EDITOR.
editor: vim

# Should 'cheat' always colorize output?
colorize: true

# Which 'chroma' colorscheme should be applied to the output?
# Options are available here:
#   https://github.com/alecthomas/chroma/tree/master/styles
style: gruvbox-dark

# Which 'chroma' "formatter" should be applied?
# One of: "terminal", "terminal256", "terminal16m"
formatter: terminal256

# Through which pager should output be piped?
# 'less -FRX' is recommended on Unix systems
# 'more' is recommended on Windows
pager: less -FRX

# The paths at which cheatsheets are available. 
# Tags associated with a cheatpath
# are automatically attached to all 
# cheatsheets residing on that path.
#
# Whenever cheatsheets share the same title (like 'tar'), 
# the most local
# cheatsheets (those which come later in this file) 
# take precedence over the
# less local sheets. This allows you to create your own 
# "overides" for "upstream" cheatsheets.
#
# But what if you want to view the "upstream" cheatsheets 
# instead of your own?
#
# Cheatsheets may be filtered by 'tags' in combination 
# with the '--tag' flag.
# 
# Example: 'cheat tar --tag=community' will display 
# the 'tar' cheatsheet that is tagged as 'community' rather 
# than your own.
#
# Paths that come earlier are considered to be the most "global", 
# and paths that come later are considered to be the most 
# "local". The most "local" paths take precedence.
#
# See: https://github.com/cheat/cheat/blob/master/doc/cheat.1.md#cheatpaths
cheatpaths:

  # Cheatsheets that are tagged "Fedora" are stored here by default:
  - name: Fedora
    path: ~/cheats/fedora
    tags: [ fedora ]
    readonly: true

  - name: Mac
    #path: /home/kinscoe/.config/cheat/cheatsheets/work
    path: ~/cheats/mac
    tags: [ mac ]
    readonly: true

  - name: rpi
    path: ~/cheats/rpi
    tags: [ rpi ]
    readonly: true

  # Cheatsheets that are tagged "all" are stored here by default:
  - name: all
    #path: /home/kinscoe/.config/cheat/cheatsheets/personal
    path: ~/cheats/all
    tags: [ all ]
    readonly: true

  - name: vim
    path: ~/cheats/vim
    tags: [ vim ]
    readonly: true

  # Community cheatsheets 
  # (https://github.com/cheat/cheatsheets):
  # To install: git clone 
  # https://github.com/cheat/cheatsheets 
  # ~/.config/cheat/cheatsheets/community
  - name: community
    path: ~/.config/cheat/cheatsheets/community
    tags: [ community ]
    readonly: true

  # You can also use glob patterns to automatically load cheatsheets from all
  # directories that match.
  #
  # Example: overload cheatsheets for projects under ~/src/github.com/example/*/
  #- name: example-projects
  #  path: ~/src/github.com/example/**/.cheat
  #  tags: [ example ]
  #  readonly: true
