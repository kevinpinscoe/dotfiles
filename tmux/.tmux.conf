# --- General ---
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g history-limit 50000
set -g mouse on

# --- Status bar ---
set -g status on
set -g status-interval 2
set -g status-position bottom
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

set -g status-left "#[fg=#89b4fa,bold] #S "
set -g status-left-length 30

set -g status-right-length 160
set -g status-right "#(~/.config/tmux/status/workingon.sh) #[fg=#45475a]│#[default] #(~/.config/tmux/status/git.sh #{pane_current_path}) #[fg=#45475a]│#[default] #(~/.config/tmux/status/aws.sh) #[fg=#45475a]│#[default] #(~/.config/tmux/status/k8s.sh) #[fg=#45475a]│#[default] #(~/.config/tmux/status/cwd.sh #{pane_current_path})#[fg=#45475a]│#[default] #[fg=#f38ba8]%H:%M"

set -g window-status-current-format "#[fg=#cba6f7,bold] #I:#W "
set -g window-status-format " #I:#W "

# --- Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

run '~/.tmux/plugins/tpm/tpm'
