# --- General ---
set -g default-terminal "tmux-256color"
set -g set-clipboard on
set -ag terminal-overrides ',xterm*:Ms=\E]52;%p1%s;%p2%s\007'
set -ag terminal-overrides ',ghostty*:Ms=\E]52;%p1%s;%p2%s\007'
set -ag terminal-overrides ',tmux*:Ms=\E]52;%p1%s;%p2%s\007'
set -g history-limit 50000
set -g mouse on

# --- Status bar ---
set -g status on
set -g status-interval 2
set -g status-position bottom
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

set -g status-left "#[fg=#89b4fa,bold] #S "
set -g status-left-length 30

set -g status-right-length 160
set -g status-right "#(~/.config/tmux/status/workingon.sh) #[fg=#45475a]│#[default] #(~/.config/tmux/status/git.sh #{pane_current_path}) #[fg=#45475a]│#[default] #(~/.config/tmux/status/aws.sh) #[fg=#45475a]│#[default] #(~/.config/tmux/status/k8s.sh) #[fg=#45475a]│#[default] #(~/.config/tmux/status/cwd.sh #{pane_current_path})#[fg=#45475a]│#[default] #[fg=#f38ba8]%H:%M"

set -g window-status-current-format "#[fg=#cba6f7,bold] #I:#W "
set -g window-status-format " #I:#W "

# --- Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'

# copyq runs on xvfb :99 (no real display on RPi5)
set -g @override_copy_command 'bash -c "DISPLAY=:99 copyq copy - && (~/.local/bin/broadcast_clip_from_pi.sh 2>/dev/null &)"'

# Double/triple-click must explicitly name the copy command; tmux-yank's
# root-table bindings use bare copy-pipe-and-cancel which skips copyq.
bind -T root DoubleClick1Pane \
  select-pane -t = \; \
  if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" \
    { send-keys -M } \
    { copy-mode -H ; send-keys -X select-word ; run-shell -d 0.3 ; send-keys -X copy-pipe-and-cancel "bash -c 'DISPLAY=:99 copyq copy - && (~/.local/bin/broadcast_clip_from_pi.sh 2>/dev/null &)'" }

bind -T root TripleClick1Pane \
  select-pane -t = \; \
  if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" \
    { send-keys -M } \
    { copy-mode -H ; send-keys -X select-line ; run-shell -d 0.3 ; send-keys -X copy-pipe-and-cancel "bash -c 'DISPLAY=:99 copyq copy - && (~/.local/bin/broadcast_clip_from_pi.sh 2>/dev/null &)'" }

# Ensure tpm (and its child shells) can find `tmux`, `git`, etc. regardless of
# how the tmux server was launched. Covers Homebrew (Mac ARM/Intel) and the
# standard Linux dirs used on Fedora and Debian/RPi. Missing dirs are harmless.
set-environment -g PATH "/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/local/sbin:/usr/bin:/usr/sbin:/bin:/sbin"

run '~/.tmux/plugins/tpm/tpm'
